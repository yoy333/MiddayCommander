name = "MC Classic"

[palette]
blue    = "4"
cyan    = "6"
white   = "15"
black   = "0"
green   = "2"
yellow  = "3"
magenta = "5"

# ─── File Panels ─────────────────────────────────
[panel]
border_fg        = "cyan"
border_bg        = "blue"
border_active_fg = "white"
border_active_bg = "blue"
header_fg        = "cyan"
header_bg        = "blue"
header_active_fg = "white"
header_active_bg = "blue"

[panel.file]
normal_fg        = "white"
normal_bg        = "blue"
dir_fg           = "white"
dir_bg           = "blue"
dir_bold         = true
exec_fg          = "green"
exec_bg          = "blue"
symlink_fg       = "magenta"
symlink_bg       = "blue"
cursor_fg        = "black"
cursor_bg        = "cyan"
cursor_dir_fg    = "black"
cursor_dir_bg    = "cyan"
cursor_dir_bold  = true
selected_fg      = "yellow"
selected_bg      = "blue"
selected_bold    = true

# ─── Status Bar ──────────────────────────────────
[statusbar]
fg = "black"
bg = "cyan"

# ─── Menu / F-Key Hints ─────────────────────────
[menubar]
fg            = "black"
bg            = "cyan"
fkey_hint_fg  = "white"
fkey_hint_bg  = "black"
fkey_label_fg = "black"
fkey_label_bg = "cyan"
